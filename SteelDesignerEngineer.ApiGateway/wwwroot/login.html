<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDI - Вход</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="alternate icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.svg">
    
    <style>
        :root{
            --primary-1: #667eea;
            --primary-2: #764ba2;
            --bg: linear-gradient(135deg, var(--primary-1) 0%, var(--primary-2) 100%);
            --card-bg: #ffffff;
            --muted: #6c757d;
            --success: #28a745;
            --danger: #dc3545;
        }
        *{box-sizing: border-box; margin:0; padding:0;}
        body{font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:var(--bg); color:#222; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
        
        .login-container{max-width:450px; width:100%;}
        .card{background:var(--card-bg); border-radius:20px; padding:40px; box-shadow:0 20px 60px rgba(0,0,0,0.2);}
        
        .logo-section{text-align:center; margin-bottom:30px;}
        .logo{width:80px; height:80px; background:#1976D2; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:22px; font-weight:bold; color:white; margin-bottom:16px; letter-spacing:1px;}
        .logo-section h1{font-size:24px; margin-bottom:6px; color:#333;}
        .logo-section p{color:var(--muted); font-size:14px;}
        
        .form-group{margin-bottom:20px;}
        .form-group label{display:block; margin-bottom:8px; font-weight:600; color:#333;}
        .form-group input{width:100%; padding:14px; border:2px solid #e0e0e0; border-radius:10px; font-size:16px; transition:border-color 0.3s;}
        .form-group input:focus{outline:none; border-color:var(--primary-1);}
        
        .form-options{display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; font-size:14px;}
        .form-options label{display:flex; align-items:center; gap:6px; color:#666;}
        .form-options a{color:var(--primary-1); text-decoration:none;}
        .form-options a:hover{text-decoration:underline;}
        
        .btn{width:100%; padding:14px; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; transition:all 0.3s;}
        .btn-primary{background:linear-gradient(135deg, var(--primary-1), var(--primary-2)); color:white; box-shadow:0 4px 15px rgba(102, 126, 234, 0.4);}
        .btn-primary:hover:not(:disabled){transform:translateY(-2px); box-shadow:0 6px 20px rgba(102, 126, 234, 0.5);}
        .btn-primary:disabled{opacity:0.6; cursor:not-allowed;}
        
        .divider{text-align:center; margin:24px 0; color:var(--muted); position:relative;}
        .divider::before, .divider::after{content:''; position:absolute; top:50%; width:40%; height:1px; background:#e0e0e0;}
        .divider::before{left:0;}
        .divider::after{right:0;}
        
        .social-login{display:flex; gap:12px;}
        .btn-social{flex:1; padding:12px; border:2px solid #e0e0e0; background:white; border-radius:10px; cursor:pointer; transition:all 0.3s; display:flex; align-items:center; justify-content:center; gap:8px; font-weight:600; color:#333;}
        .btn-social:hover{border-color:var(--primary-1); transform:translateY(-2px); background:#f8f9fa;}
        .btn-social:disabled{opacity:0.6; cursor:not-allowed;}
        
        .register-link{text-align:center; margin-top:24px; color:#666;}
        .register-link a{color:var(--primary-1); text-decoration:none; font-weight:600;}
        .register-link a:hover{text-decoration:underline;}
        
        .back-link{text-align:center; margin-top:20px;}
        .back-link a{color:white; text-decoration:none; display:inline-flex; align-items:center; gap:6px; font-weight:500;}
        .back-link a:hover{text-decoration:underline;}
        
        .alert{padding:12px; border-radius:8px; margin-bottom:20px; display:none;}
        .alert-success{background:#d4edda; color:#155724; border:1px solid #c3e6cb;}
        .alert-danger{background:#f8d7da; color:#721c24; border:1px solid #f5c6cb;}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card">
            <div class="logo-section">
                <div class="logo">SDI</div>
                <h1>С возвращением!</h1>
                <p>Steel Designer Engineer</p>
            </div>

            <div id="alert" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox" id="remember">
                        Запомнить меня
                    </label>
                    <a href="#">Забыли пароль?</a>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">Войти</button>
            </form>

            <div class="divider">или</div>

            <div class="social-login">
                <button class="btn-social" id="googleBtn" onclick="socialLogin('google')">
                    🔍 Google
                </button>
                <button class="btn-social" id="githubBtn" onclick="socialLogin('github')">
                    💻 GitHub
                </button>
            </div>

            <div class="register-link">
                Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
            </div>
        </div>

        <div class="back-link">
            <a href="/">← Вернуться на главную</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const alertBox = document.getElementById('alert');
        const loginBtn = document.getElementById('loginBtn');
        const googleBtn = document.getElementById('googleBtn');
        const githubBtn = document.getElementById('githubBtn');
        
        const API_URL = window.location.origin;

        function showAlert(message, type) {
            alertBox.innerHTML = message;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = 'block';
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 5000);
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.textContent = 'Проверка...';

            try {
                const response = await fetch(`${API_URL}/api/Auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showAlert('✅ Вход выполнен успешно! Перенаправление...', 'success');
                    
                    // Save user info for UI (not for authentication!)
                    localStorage.setItem('userEmail', data.user.email);
                    localStorage.setItem('userId', data.user.id);
                    localStorage.setItem('userRole', data.user.role);
                    localStorage.setItem('userFirstName', data.user.firstName);
                    localStorage.setItem('userLastName', data.user.lastName);
                    
                    setTimeout(() => {
                        window.location.href = 'profile.html';
                    }, 1000);
                } else {
                    showAlert(`❌ ${data.message || 'Неверный email или пароль'}`, 'danger');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Войти';
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('❌ Ошибка подключения к серверу', 'danger');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Войти';
            }
        });

        // OAuth Social Login
        async function socialLogin(provider) {
            try {
                localStorage.setItem('oauth_provider', provider);

                googleBtn.disabled = true;
                githubBtn.disabled = true;

                const response = await fetch(`${API_URL}/api/Auth/oauth/${provider}/url`, {
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || `${provider} OAuth не настроен`);
                }

                const data = await response.json();

                if (data.authUrl) {
                    showAlert(`🔄 Перенаправление на ${provider}...`, 'success');
                    setTimeout(() => {
                        window.location.href = data.authUrl;
                    }, 500);
                } else {
                    throw new Error('OAuth URL недоступен');
                }
            } catch (error) {
                console.error(`${provider} OAuth error:`, error);
                showAlert(`❌ ${error.message}`, 'danger');
                googleBtn.disabled = false;
                githubBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
