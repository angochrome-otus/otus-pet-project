<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Callback - Steel Designer Engineer</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="alternate icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.svg">
    
    <style>
        :root {
            --primary-1: #667eea;
            --primary-2: #764ba2;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-1) 0%, var(--primary-2) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary-1);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; }
        .error { color: #dc3545; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Processing OAuth...</h2>
        <p id="status">Please wait...</p>
        <p id="error" class="error" style="display:none;"></p>
    </div>

    <script>
        const API_URL = window.location.origin;
        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error');

        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const status = urlParams.get('status');
        const error = urlParams.get('error');

        // Detect provider from localStorage
        const provider = localStorage.getItem('oauth_provider') || 'google';

        async function handleOAuthCallback() {
            // Check for errors from OAuth provider
            if (error) {
                showError(`OAuth error: ${error}`);
                return;
            }

            // Check if we're processing OAuth (code and state handled by backend GET)
            if (status !== 'processing') {
                showError('Invalid OAuth callback state');
                return;
            }

            try {
                statusEl.textContent = `Authenticating with ${provider}...`;

                // Call backend OAuth callback POST (code and state stored in session)
                const response = await fetch(`${API_URL}/api/Auth/oauth/callback`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        provider: provider,
                        code: 'SESSION_STORED',
                        state: 'SESSION_STORED'
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'Authentication failed');
                }

                const data = await response.json();

                if (data.success) {
                    // Save user info for UI (not for authentication!)
                    localStorage.setItem('userEmail', data.user.email);
                    localStorage.setItem('userId', data.user.id);
                    localStorage.setItem('userRole', data.user.role);
                    localStorage.setItem('userFirstName', data.user.firstName);
                    localStorage.setItem('userLastName', data.user.lastName);
                    localStorage.removeItem('oauth_provider');

                    statusEl.textContent = data.isNewUser 
                        ? '✅ Registration successful!' 
                        : '✅ Login successful!';

                    // Redirect to profile
                    setTimeout(() => {
                        window.location.href = '/profile.html';
                    }, 1000);
                } else {
                    throw new Error(data.message || 'Authentication failed');
                }
            } catch (err) {
                console.error('OAuth callback error:', err);
                showError(err.message);
            }
        }

        function showError(message) {
            errorEl.textContent = `❌ Error: ${message}`;
            errorEl.style.display = 'block';
            statusEl.textContent = 'Authentication failed';

            // Redirect to login after 3 seconds
            setTimeout(() => {
                window.location.href = '/login.html';
            }, 3000);
        }

        // Start OAuth flow
        handleOAuthCallback();
    </script>
</body>
</html>
