<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - Steel Designer Engineer</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="alternate icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.svg">
    
    <style>
        :root{
            --primary-1: #667eea;
            --primary-2: #764ba2;
            --bg: linear-gradient(135deg, var(--primary-1) 0%, var(--primary-2) 100%);
            --card-bg: #ffffff;
            --muted: #6c757d;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --info: #17a2b8;
        }
        *{box-sizing: border-box; margin:0; padding:0;}
        body{font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:var(--bg); color:#222; line-height:1.6;}
        
        .dashboard{display:flex; min-height:100vh;}
        
        /* Sidebar */
        .sidebar{width:280px; background:rgba(255,255,255,0.95); padding:24px; box-shadow:2px 0 10px rgba(0,0,0,0.1);}
        .sidebar-header{text-align:center; margin-bottom:30px; padding-bottom:20px; border-bottom:2px solid #e0e0e0;}
        .avatar{width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg, var(--primary-1), var(--primary-2)); display:inline-flex; align-items:center; justify-content:center; font-size:36px; margin-bottom:12px;}
        .user-name{font-size:18px; font-weight:700; margin-bottom:4px;}
        .user-email{font-size:14px; color:var(--muted);}
        .user-role{display:inline-block; padding:4px 8px; border-radius:4px; font-size:12px; font-weight:600; margin-top:8px;}
        .role-student{background:#d4edda; color:#155724;}
        .role-teacher{background:#fff3cd; color:#856404;}
        .role-admin{background:#f8d7da; color:#721c24;}
        
        .menu{list-style:none;}
        .menu li{margin-bottom:8px;}
        .menu a{display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:10px; text-decoration:none; color:#333; transition:all 0.3s; font-weight:500;}
        .menu a:hover, .menu a.active{background:linear-gradient(135deg, var(--primary-1), var(--primary-2)); color:white;}
        .menu-icon{font-size:20px;}
        
        /* Main Content */
        .main-content{flex:1; padding:30px;}
        .container{max-width:1200px; margin:0 auto;}
        
        .header{display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; color:white;}
        .header h1{font-size:32px;}
        .btn{padding:10px 20px; border:none; border-radius:8px; font-weight:600; cursor:pointer; text-decoration:none; display:inline-block; transition:all 0.3s;}
        .btn-logout{background:rgba(255,255,255,0.2); color:white; border:2px solid rgba(255,255,255,0.3);}
        .btn-logout:hover{background:rgba(255,255,255,0.3);}
        .btn-logout:disabled{opacity:0.5; cursor:not-allowed;}
        
        .alert{padding:12px; border-radius:8px; margin-bottom:20px; display:none;}
        .alert-info{background:#d1ecf1; color:#0c5460; border:1px solid #bee5eb;}
        
        .stats-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:20px; margin-bottom:30px;}
        .stat-card{background:white; border-radius:16px; padding:24px; box-shadow:0 4px 15px rgba(0,0,0,0.1); transition:transform 0.3s;}
        .stat-card:hover{transform:translateY(-4px);}
        .stat-icon{width:50px; height:50px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px; margin-bottom:12px;}
        .stat-icon.success{background:#d4edda; color:#155724;}
        .stat-icon.warning{background:#fff3cd; color:#856404;}
        .stat-icon.info{background:#d1ecf1; color:#0c5460;}
        .stat-icon.primary{background:#cfe2ff; color:#084298;}
        .stat-value{font-size:28px; font-weight:700; margin-bottom:4px;}
        .stat-label{color:var(--muted); font-size:14px;}
        
        .card{background:white; border-radius:16px; padding:28px; box-shadow:0 4px 15px rgba(0,0,0,0.1); margin-bottom:20px;}
        .card-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-bottom:16px; border-bottom:2px solid #f0f0f0;}
        .card-header h3{font-size:20px; color:#333;}
        
        @media (max-width:768px){
            .dashboard{flex-direction:column;}
            .sidebar{width:100%;}
            .stats-grid{grid-template-columns:1fr;}
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="avatar">👤</div>
                <div class="user-name" id="userName">Загрузка...</div>
                <div class="user-email" id="userEmail">Загрузка...</div>
                <span class="user-role" id="userRole"></span>
            </div>
            
            <ul class="menu">
                <li><a href="#" class="active"><span class="menu-icon">📊</span> Панель управления</a></li>
                <li><a href="/"><span class="menu-icon">📚</span> Мои курсы</a></li>
                <li><a href="/swagger"><span class="menu-icon">🔧</span> Документация API</a></li>
                <li><a href="#" onclick="logout(); return false;"><span class="menu-icon">🚪</span> Выйти</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="container">
                <div class="header">
                    <h1>Профиль пользователя</h1>
                    <button class="btn btn-logout" id="logoutBtn" onclick="logout()">Выйти</button>
                </div>

                <div id="alert" class="alert alert-info"></div>

                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon success">✅</div>
                        <div class="stat-value" id="enrolledCourses">-</div>
                        <div class="stat-label">Активные курсы</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon warning">🏆</div>
                        <div class="stat-value" id="completedCourses">-</div>
                        <div class="stat-label">Завершенные курсы</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon info">📅</div>
                        <div class="stat-value" id="memberSince">-</div>
                        <div class="stat-label">Участник с</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon primary">🕐</div>
                        <div class="stat-value" id="lastLogin">-</div>
                        <div class="stat-label">Последний вход</div>
                    </div>
                </div>

                <!-- User Info Card -->
                <div class="card">
                    <div class="card-header">
                        <h3>Информация о пользователе</h3>
                    </div>
                    <p><strong>ID:</strong> <span id="userId">-</span></p>
                    <p><strong>Email:</strong> <span id="userEmailFull">-</span></p>
                    <p><strong>Имя:</strong> <span id="userFirstName">-</span></p>
                    <p><strong>Фамилия:</strong> <span id="userLastName">-</span></p>
                    <p><strong>Роль:</strong> <span id="userRoleFull">-</span></p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = window.location.origin;
        const alertBox = document.getElementById('alert');
        const logoutBtn = document.getElementById('logoutBtn');

        function showAlert(message) {
            alertBox.textContent = message;
            alertBox.style.display = 'block';
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 5000);
        }

        // Load user data from API (session-based)
        async function loadUserData() {
            try {
                console.log('Загрузка данных пользователя...'); // Debug log
                
                const response = await fetch(`${API_URL}/api/Auth/me`, {
                    method: 'GET',
                    credentials: 'include'
                });

                console.log('Статус ответа:', response.status); // Debug log

                if (response.ok) {
                    const user = await response.json();
                    console.log('Пользователь загружен:', user); // Debug log
                    
                    // Redirect to role-specific dashboard
                    const dashboard = getRoleBasedDashboard(user.role);
                    console.log('Перенаправление на:', dashboard);
                    window.location.href = dashboard;
                    
                } else if (response.status === 401) {
                    // Session expired or not authenticated
                    console.warn('Не авторизован, перенаправление на страницу входа...'); // Debug log
                    showAlert('⚠️ Сессия истекла. Пожалуйста, войдите снова.');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    showAlert('❌ Ошибка загрузки данных пользователя');
                    console.error('Ошибка ответа:', response.status, response.statusText);
                }
            } catch (error) {
                console.error('Ошибка загрузки данных пользователя:', error);
                showAlert('❌ Ошибка подключения к серверу');
                // Don't redirect on network error - might be temporary
            }
        }

        function getRoleBasedDashboard(role) {
            switch(role) {
                case 'Student': return 'student-dashboard.html';
                case 'Teacher': return 'teacher-dashboard.html';
                case 'Admin': return 'admin-dashboard.html';
                default: return 'student-dashboard.html';
            }
        }

        // Logout function with API call
        async function logout() {
            if (!confirm('Вы уверены, что хотите выйти?')) {
                return;
            }

            logoutBtn.disabled = true;
            logoutBtn.textContent = 'Выход...';

            try {
                const response = await fetch(`${API_URL}/api/Auth/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });

                if (response.ok) {
                    showAlert('✅ Успешный выход из системы');
                } else {
                    console.error('Ошибка вызова API выхода');
                }
            } catch (error) {
                console.error('Ошибка выхода:', error);
            } finally {
                // Clear any localStorage
                localStorage.clear();
                
                // Redirect to login
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 500);
            }
        }

        // Load data on page load (with delay to prevent race condition)
        setTimeout(() => {
            loadUserData();
        }, 100);
    </script>
</body>
</html>
