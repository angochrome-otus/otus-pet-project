<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDI - Регистрация</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="alternate icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.svg">
    
    <style>
        :root{
            --primary-1: #667eea;
            --primary-2: #764ba2;
            --bg: linear-gradient(135deg, var(--primary-1) 0%, var(--primary-2) 100%);
            --card-bg: #ffffff;
            --muted: #6c757d;
            --success: #28a745;
            --danger: #dc3545;
        }
        *{box-sizing: border-box; margin:0; padding:0;}
        body{font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:var(--bg); color:#222; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
        
        .register-container{max-width:500px; width:100%;}
        .card{background:var(--card-bg); border-radius:20px; padding:40px; box-shadow:0 20px 60px rgba(0,0,0,0.2);}
        
        .logo-section{text-align:center; margin-bottom:30px;}
        .logo{width:80px; height:80px; background:#1976D2; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:22px; font-weight:bold; color:white; margin-bottom:16px; letter-spacing:1px;}
        .logo-section h1{font-size:24px; margin-bottom:6px; color:#333;}
        .logo-section p{color:var(--muted); font-size:14px;}
        
        .form-group{margin-bottom:20px;}
        .form-group label{display:block; margin-bottom:8px; font-weight:600; color:#333;}
        .form-group input{width:100%; padding:14px; border:2px solid #e0e0e0; border-radius:10px; font-size:16px; transition:border-color 0.3s;}
        .form-group input:focus{outline:none; border-color:var(--primary-1);}
        .form-group small{color:var(--muted); font-size:12px; margin-top:4px; display:block;}
        
        .form-row{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
        
        .password-requirements{font-size:12px; color:var(--muted); margin-top:8px; padding:8px; background:#f8f9fa; border-radius:6px;}
        .password-requirements ul{margin:8px 0 0 20px; padding:0;}
        .password-requirements li{margin:4px 0;}
        .password-requirements li.valid{color:var(--success);}
        .password-requirements li.invalid{color:var(--danger);}
        
        .btn{width:100%; padding:14px; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; transition:all 0.3s;}
        .btn-primary{background:linear-gradient(135deg, var(--primary-1), var(--primary-2)); color:white; box-shadow:0 4px 15px rgba(102, 126, 234, 0.4);}
        .btn-primary:hover:not(:disabled){transform:translateY(-2px); box-shadow:0 6px 20px rgba(102, 126, 234, 0.5);}
        .btn-primary:disabled{opacity:0.6; cursor:not-allowed;}
        
        .login-link{text-align:center; margin-top:24px; color:#666;}
        .login-link a{color:var(--primary-1); text-decoration:none; font-weight:600;}
        .login-link a:hover{text-decoration:underline;}
        
        .back-link{text-align:center; margin-top:20px;}
        .back-link a{color:white; text-decoration:none; display:inline-flex; align-items:center; gap:6px; font-weight:500;}
        .back-link a:hover{text-decoration:underline;}
        
        .alert{padding:12px; border-radius:8px; margin-bottom:20px; display:none;}
        .alert-success{background:#d4edda; color:#155724; border:1px solid #c3e6cb;}
        .alert-danger{background:#f8d7da; color:#721c24; border:1px solid #f5c6cb;}
    </style>
</head>
<body>
    <div class="register-container">
        <div class="card">
            <div class="logo-section">
                <div class="logo">SDI</div>
                <h1>Создать аккаунт</h1>
                <p>Steel Designer Engineer</p>
            </div>

            <div id="alert" class="alert"></div>

            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">Имя *</label>
                        <input type="text" id="firstName" placeholder="Иван" required>
                    </div>

                    <div class="form-group">
                        <label for="lastName">Фамилия *</label>
                        <input type="text" id="lastName" placeholder="Иванов" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" placeholder="ivan@example.com" required>
                    <small>Будет использоваться для входа</small>
                </div>

                <div class="form-group">
                    <label for="role">Я регистрируюсь как *</label>
                    <select id="role" required style="width:100%; padding:14px; border:2px solid #e0e0e0; border-radius:10px; font-size:16px; background:white; cursor:pointer;">
                        <option value="Student">Студент - Изучать курсы и выполнять задания</option>
                        <option value="Teacher">Преподаватель - Создавать и управлять курсами</option>
                    </select>
                    <small>Выберите свою роль на платформе</small>
                </div>

                <div class="form-group">
                    <label for="password">Пароль *</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <div class="password-requirements">
                        <strong>Требования к паролю:</strong>
                        <ul id="passwordReqs">
                            <li id="req-length" class="invalid">Минимум 6 символов</li>
                        </ul>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Подтвердите пароль *</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required>
                    <small id="passwordMatch" style="display:none;"></small>
                </div>

                <button type="submit" class="btn btn-primary" id="registerBtn">Зарегистрироваться</button>
            </form>

            <div class="login-link">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </div>
        </div>

        <div class="back-link">
            <a href="/">← Вернуться на главную</a>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const alertBox = document.getElementById('alert');
        const registerBtn = document.getElementById('registerBtn');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const passwordMatch = document.getElementById('passwordMatch');
        
        const API_URL = window.location.origin;

        function showAlert(message, type) {
            alertBox.innerHTML = message;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = 'block';
            
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, type === 'success' ? 3000 : 5000);
        }

        // Password validation
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            
            document.getElementById('req-length').className = password.length >= 4 ? 'valid' : 'invalid';
            
            checkPasswordMatch();
        });

        confirmPasswordInput.addEventListener('input', checkPasswordMatch);

        function checkPasswordMatch() {
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            if (confirmPassword.length === 0) {
                passwordMatch.style.display = 'none';
                return;
            }
            
            passwordMatch.style.display = 'block';
            
            if (password === confirmPassword) {
                passwordMatch.textContent = '✓ Пароли совпадают';
                passwordMatch.style.color = 'var(--success)';
            } else {
                passwordMatch.textContent = '✗ Пароли не совпадают';
                passwordMatch.style.color = 'var(--danger)';
            }
        }

        function validatePassword(password) {
            return password.length >= 6;
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const role = document.getElementById('role').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!firstName || !lastName) {
                showAlert('❌ Пожалуйста, заполните имя и фамилию', 'danger');
                return;
            }

            if (!validatePassword(password)) {
                showAlert('❌ Пароль не соответствует требованиям безопасности', 'danger');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('❌ Пароли не совпадают', 'danger');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = 'Регистрация...';

            try {
                const response = await fetch(`${API_URL}/api/Auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        email,
                        password,
                        confirmPassword,
                        firstName,
                        lastName,
                        role
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showAlert('✅ Регистрация успешна! Перенаправление...', 'success');
                    
                    // Save user info for UI (not for authentication!)
                    localStorage.setItem('userEmail', data.user.email);
                    localStorage.setItem('userId', data.user.id);
                    localStorage.setItem('userRole', data.user.role);
                    localStorage.setItem('userFirstName', data.user.firstName);
                    localStorage.setItem('userLastName', data.user.lastName);
                    
                    setTimeout(() => {
                        window.location.href = 'profile.html';
                    }, 1500);
                } else {
                    showAlert(`❌ ${data.message || 'Ошибка регистрации. Пользователь может уже существовать.'}`, 'danger');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Зарегистрироваться';
                }
            } catch (error) {
                console.error('Registration error:', error);
                showAlert('❌ Ошибка подключения к серверу. Проверьте, запущен ли API.', 'danger');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Зарегистрироваться';
            }
        });

        // Check if already authenticated
        async function checkAuth() {
            try {
                const response = await fetch(`${API_URL}/api/Auth/me`, {
                    credentials: 'include'
                });
                
                if (response.ok) {
                    window.location.href = 'profile.html';
                }
            } catch (error) {
                // Not authenticated, stay on registration page
            }
        }

        checkAuth();
    </script>
</body>
</html>
