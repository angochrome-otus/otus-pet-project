version: '3.8'

# ⚠️ DEPRECATED: Use docker-compose.microservices.yml instead
# 
# This docker-compose file is kept for backward compatibility only.
# The application has been migrated to a microservices architecture.
# 
# For local development and testing, use:
#   docker-compose -f docker-compose.microservices.yml up -d
#
# For production deployment, use:
#   docker-compose -f docker-compose.production.yml up -d

services:
  # Redirect to microservices compose
  # This service will fail intentionally to notify users
  deprecated-notice:
    image: alpine:latest
    container_name: deprecated-notice
    command: |
      sh -c "echo '⚠️  WARNING: This docker-compose.yml is DEPRECATED!' && 
             echo 'Please use docker-compose.microservices.yml instead:' && 
             echo '  docker-compose -f docker-compose.microservices.yml up -d' && 
             exit 1"

  # RabbitMQ - still needed for backward compatibility
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: xxx711717XXX
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - steel-network

volumes:
  rabbitmq_data:

networks:
  steel-network:
    driver: bridge