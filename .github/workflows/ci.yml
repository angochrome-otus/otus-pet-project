name: CI - Build and Test

on:
  push:
    branches: [ developer_Nikita, develop, main ]
  pull_request:
    branches: [ developer_Nikita, develop, main ]

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_PATH: './OTUS.Pet.Education.sln'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}
      
    - name: Build solution
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore
      
    - name: Check for test projects
      id: check-tests
      run: |
        if dotnet sln ${{ env.SOLUTION_PATH }} list | grep -i "test"; then
          echo "has_tests=true" >> $GITHUB_OUTPUT
        else
          echo "has_tests=false" >> $GITHUB_OUTPUT
          echo "::notice::No test projects found in solution"
        fi
      
    - name: Run tests
      if: steps.check-tests.outputs.has_tests == 'true'
      run: |
        dotnet test ${{ env.SOLUTION_PATH }} \
          --configuration Release \
          --no-build \
          --verbosity normal \
          --logger "trx;LogFileName=test-results.trx" \
          --results-directory ./TestResults
      continue-on-error: true

    - name: Check for TRX results
      id: check-trx
      if: steps.check-tests.outputs.has_tests == 'true' && always()
      run: |
        shopt -s globstar nullglob
        files=(TestResults/**/*.trx)
        if [ ${#files[@]} -gt 0 ]; then
          echo "has_trx=true" >> $GITHUB_OUTPUT
          echo "Found ${#files[@]} TRX file(s)."
        else
          echo "has_trx=false" >> $GITHUB_OUTPUT
          echo "::notice::No TRX test report files were found"
        fi
      
    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: steps.check-trx.outputs.has_trx == 'true' && always()
      with:
        name: Test Results
        path: 'TestResults/**/*.trx'
        reporter: dotnet-trx
        fail-on-error: false
        
    - name: Upload test results
      if: steps.check-trx.outputs.has_trx == 'true' && always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: TestResults/**/*.trx
        retention-days: 30
        
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}
      
    - name: Build solution
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore
      
    - name: Check if dotnet format is available
      id: check-format
      run: |
        if dotnet format --help > /dev/null 2>&1; then
          echo "has_format=true" >> $GITHUB_OUTPUT
        else
          echo "has_format=false" >> $GITHUB_OUTPUT
        fi
      
    - name: Run code analysis
      if: steps.check-format.outputs.has_format == 'true'
      run: dotnet format ${{ env.SOLUTION_PATH }} --verify-no-changes --verbosity diagnostic
      continue-on-error: true
      
    - name: Run build warnings check
      run: |
        dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-incremental > build-output.txt 2>&1 || true
        if grep -q "warning" build-output.txt; then
          echo "::warning::Build warnings found"
          grep "warning" build-output.txt || true
        fi

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}
      
    - name: Check for vulnerable packages
      run: |
        echo "Checking for vulnerable packages..."
        dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerable-packages.txt
        if grep -q "has the following vulnerable packages" vulnerable-packages.txt; then
          echo "::warning::Vulnerable packages found"
          cat vulnerable-packages.txt
        else
          echo "? No vulnerable packages found"
        fi
      continue-on-error: true
      
    - name: Upload vulnerability report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: vulnerability-report
        path: vulnerable-packages.txt
        retention-days: 30
