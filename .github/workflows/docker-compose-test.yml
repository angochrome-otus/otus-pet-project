name: Docker Compose - Local Testing

on:
  pull_request:
    branches: [ developer_Nikita, develop, main ]
  workflow_dispatch:

jobs:
  docker-compose-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build services with docker-compose
      run: docker-compose -f docker-compose.microservices.yml build
      
    - name: Start services
      run: docker-compose -f docker-compose.microservices.yml up -d
      
    - name: Wait for services to be ready
      run: |
        echo "Waiting for services to start..."
        sleep 60
        
    - name: Check service health
      run: |
        # Check RabbitMQ
        docker-compose -f docker-compose.microservices.yml exec -T rabbitmq rabbitmq-diagnostics ping || exit 1
        
        # Check MongoDB
        docker-compose -f docker-compose.microservices.yml exec -T mongodb mongosh --eval "db.adminCommand('ping')" || exit 1
        
        # Check Redis
        docker-compose -f docker-compose.microservices.yml exec -T redis redis-cli --pass xxx711717 ping || exit 1
        
        # Check API Gateway
        curl -f http://localhost:5000/health || exit 1
        
    - name: Show logs on failure
      if: failure()
      run: |
        echo "=== API Gateway Logs ==="
        docker-compose -f docker-compose.microservices.yml logs api-gateway
        
        echo "=== Auth Service Logs ==="
        docker-compose -f docker-compose.microservices.yml logs auth-service
        
        echo "=== Session Service Logs ==="
        docker-compose -f docker-compose.microservices.yml logs session-service
        
        echo "=== PageContent Service Logs ==="
        docker-compose -f docker-compose.microservices.yml logs pagecontent-service
        
    - name: Cleanup
      if: always()
      run: docker-compose -f docker-compose.microservices.yml down -v
