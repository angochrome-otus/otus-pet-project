apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: traefik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      serviceAccountName: traefik
      containers:
        - name: traefik
          image: traefik:v2.11.2
          args:
            - "--api=true"
            - "--api.insecure=false"
            - "--providers.kubernetescrd=true"
            - "--providers.kubernetescrd.allowCrossNamespace=true"
            - "--providers.kubernetesingress=true"
            - "--entrypoints.web.address=:80"
            - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
            - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
            - "--entrypoints.websecure.address=:443"
            - "--entrypoints.mongodb.address=:27017"
            - "--entrypoints.rabbitmq.address=:15672"
            - "--entrypoints.amqp.address=:5672"
            - "--certificatesresolvers.mytlschallenge.acme.httpchallenge.entrypoint=web"
            - "--certificatesresolvers.mytlschallenge.acme.email=i@nnshchegolev.ru"
            - "--certificatesresolvers.mytlschallenge.acme.storage=/letsencrypt/acme.json"
          ports:
            - containerPort: 80
            - containerPort: 443
            - containerPort: 15672
            - containerPort: 5672
            - containerPort: 27017
          volumeMounts:
            - name: traefik-data
              mountPath: /letsencrypt
          securityContext:
            runAsUser: 0
      volumes:
        - name: traefik-data
          persistentVolumeClaim:
            claimName: traefik-data
---
apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: traefik
spec:
  type: LoadBalancer
  loadBalancerIP: "72.56.72.77"
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
    - name: rabbitmq-management
      port: 15672
      targetPort: 15672
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: mongodb-tcp
      port: 27017
      targetPort: 27017
  selector:
    app: traefik
