# --- Secret with password (replace with real base64; DO NOT COMMIT production password)
apiVersion: v1
kind: Secret
metadata:
  name: postgres-global-secret
  namespace: database
type: Opaque
data:
  # echo -n 'xxx711717' | base64 => eHh4NzExNzE3
  POSTGRES_PASSWORD: eHh4NzExNzE3
---
# --- Persistent storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-global-data
  namespace: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
# --- Deployment (single DB only)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-global
  namespace: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-global
  template:
    metadata:
      labels:
        app: postgres-global
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16   # corrected tag (pg16-v0.7.4 did not exist in registry)
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-global-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: n8n
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready","-U","postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready","-U","postgres","-d","n8n"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-global-data
---
# --- ClusterIP Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-global
  namespace: database
spec:
  selector:
    app: postgres-global
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
# --- NodePort Service (external access) - optional; remove if not required externally
apiVersion: v1
kind: Service
metadata:
  name: postgres-global-external
  namespace: database
spec:
  selector:
    app: postgres-global
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      nodePort: 30001
  type: NodePort
