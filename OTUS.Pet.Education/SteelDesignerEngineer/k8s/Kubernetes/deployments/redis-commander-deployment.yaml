apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-insight
  namespace: n8n
  labels:
    app: redis-insight
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-insight
  template:
    metadata:
      labels:
        app: redis-insight
    spec:
      containers:
        - name: redis-insight
          image: redis/redisinsight:latest
          ports:
            - containerPort: 5540
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-insight-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis-insight
  namespace: n8n
spec:
  type: ClusterIP
  selector:
    app: redis-insight
  ports:
    - protocol: TCP
      port: 5540
      targetPort: 5540
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-insight-data
  namespace: n8n
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
