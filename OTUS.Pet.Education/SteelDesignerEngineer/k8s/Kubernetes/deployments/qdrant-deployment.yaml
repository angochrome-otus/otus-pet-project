apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant-deployment
  namespace: qdrant
  labels:
    app: qdrant-deployment
spec:
  replicas: 1 # Deployment used for stateless/ephemeral instances; avoid mounting the same PVC in Deployment
  selector:
    matchLabels:
      app: qdrant-deployment
  template:
    metadata:
      labels:
        app: qdrant-deployment
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6333
            - name: grpc
              containerPort: 6334
          env:
            - name: QDRANT__SERVICE__API_KEY
              valueFrom:
                secretKeyRef:
                  name: qdrant-secret
                  key: QDRANT_API_KEY
            - name: QDRANT__SERVICE__HTTP_PORT
              value: "6333"
            - name: QDRANT__SERVICE__GRPC_PORT
              value: "6334"
          # Removed volumeMount for qdrant-data to avoid multiple pods mounting same RWO PVC
          volumeMounts:
            - name: qdrant-config
              mountPath: /qdrant/config
          readinessProbe:
            httpGet:
              path: /readyz
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
      volumes:
        - name: qdrant-config
          configMap:
            name: qdrant-config
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant-deployment-svc
  namespace: qdrant
  labels:
    app: qdrant-deployment
spec:
  type: NodePort
  selector:
    app: qdrant-deployment
  ports:
    - name: http
      protocol: TCP
      port: 6333
      targetPort: 6333
    - name: grpc
      protocol: TCP
      port: 6334
      targetPort: 6334
