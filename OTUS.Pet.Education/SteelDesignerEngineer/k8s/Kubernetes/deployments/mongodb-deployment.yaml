apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: mongodb
spec:
  serviceName: "mongodb"
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      securityContext:
        fsGroup: 999
      initContainers:
      - name: init-replica-key-copy
        image: busybox
        command:
        - sh
        - -c
        - |
          set -e
          mkdir -p /replica-key-dir
          if [ -f /tmp/secret/replica-key ]; then
            cp /tmp/secret/replica-key /replica-key-dir/replica-key
            chown 999:999 /replica-key-dir/replica-key
            chmod 600 /replica-key-dir/replica-key
          else
            echo "Replica key not found in secret mount" >&2
            exit 1
          fi
        volumeMounts:
        - name: replica-key-secret
          mountPath: /tmp/secret
        - name: replica-key-dir
          mountPath: /replica-key-dir
      containers:
      - name: mongodb
        image: mongo:6.0
        ports:
        - containerPort: 27017
        envFrom:
        - configMapRef:
            name: mongodb-config
        env:
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: mongodb-root-password
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: mongodb-username
        - name: MONGO_REPLICA_SET_KEY
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: mongodb-replica-set-key
        command:
        - mongod
        - "--replSet"
        - "rs0"
        - "--keyFile"
        - "/data/replica-key/replica-key"
        - "--bind_ip_all"
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
        - name: replica-key-dir
          mountPath: /data/replica-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        securityContext:
          runAsUser: 999
          runAsGroup: 999
      volumes:
      - name: replica-key-secret
        secret:
          secretName: mongodb-secret
          items:
          - key: mongodb-replica-set-key
            path: replica-key
          defaultMode: 0400
      - name: replica-key-dir
        emptyDir: {}
      - name: mongodb-data
        persistentVolumeClaim:
          claimName: mongodb-pvc
