apiVersion: traefik.containo.us/v1alpha1
kind: TLSOption
metadata:
  name: tls-options
  namespace: n8n
spec:
  # Enforce modern minimum
  minVersion: VersionTLS12
  # (Optional) set a maxVersion explicitly if you want to forbid future drafts
  # maxVersion: VersionTLS13
  cipherSuites:
    # Strong modern RSA suites (order = preference)
    - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
    - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
  curvePreferences:
    - CurveP256
    - CurveP384
  alpnProtocols:
    - h2
    - http/1.1
  sniStrict: true