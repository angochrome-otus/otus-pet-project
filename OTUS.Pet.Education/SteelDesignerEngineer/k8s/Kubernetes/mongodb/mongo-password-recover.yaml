apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-password-recover
  namespace: mongodb
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      securityContext:
        fsGroup: 999
      containers:
        - name: recover
          image: mongo:6.0
          securityContext:
            runAsUser: 999
            runAsGroup: 999
          command:
            - "/bin/bash"
            - "-lc"
          args:
            - |
              set -e
              echo "Starting mongod WITHOUT auth on27018..."
              mongod --dbpath /data/db --bind_ip 127.0.0.1 --port 27018 --fork --logpath /tmp/mongo-recover.log

              echo "Waiting for mongod to be ready..."
              for i in {1..30}; do
                if mongosh --port 27018 --eval "db.runCommand({ ping:1 })" >/dev/null 2>&1; then
                  break
                fi
                sleep 1
              done

              echo "Ensuring admin user exists and resetting password..."
              mongosh --port 27018 --eval '
                const admin = db.getSiblingDB("admin");
                const u = admin.getUser("admin");
                if (u) {
                  admin.updateUser("admin", { pwd: "xxx711717XXX" });
                } else {
                  admin.createUser({ user: "admin", pwd: "xxx711717XXX", roles: [ { role: "root", db: "admin" } ] });
                }
              '

              echo "Shutting down..."
              mongosh --port 27018 --eval 'db.getSiblingDB("admin").shutdownServer()'
          volumeMounts:
            - name: data
              mountPath: /data/db
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mongodb-pvc
