apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-create-readonly-user
  namespace: mongodb
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: create-user
          image: mongo:6.0
          env:
            - name: MONGO_HOST
              value: "mongodb-service"
            - name: MONGO_PORT
              value: "27017"
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: mongodb-username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: mongodb-root-password
            - name: READONLY_USER
              valueFrom:
                secretKeyRef:
                  name: mongo-express-secret
                  key: ME_CONFIG_MONGODB_ADMINUSERNAME
            - name: READONLY_PASS
              valueFrom:
                secretKeyRef:
                  name: mongo-express-secret
                  key: ME_CONFIG_MONGODB_ADMINPASSWORD
          command: ["/bin/sh", "-c"]
          args:
            - |
              mongosh "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@${MONGO_HOST}:${MONGO_PORT}/admin?authSource=admin" --eval '
              const user = process.env.READONLY_USER;
              const pass = process.env.READONLY_PASS;
              const u = db.getUser(user);
              if (!u) {
                db.createUser({ user, pwd: pass, roles: [{ role: "readAnyDatabase", db: "admin" }] });
                print("Created read-only user");
              } else {
                print("Read-only user already exists");
              }
              '