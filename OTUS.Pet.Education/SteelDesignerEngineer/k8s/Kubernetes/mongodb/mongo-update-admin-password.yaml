apiVersion: batch/v1
kind: Job
metadata:
 name: mongo-update-admin-password
 namespace: mongodb
spec:
 backoffLimit: 0
 template:
   spec:
     restartPolicy: Never
     containers:
     - name: update-pass
       image: mongo:6.0
       command: ["bash", "-lc"]
       args:
       - |
         set -euo pipefail
         echo "Connecting to MongoDB and rotating admin password..."
         candidates=("${OLD_PASS}" "${OLD_PASS_ALT1}" "${OLD_PASS_ALT2}")
         for p in "${candidates[@]}"; do
           if [ -z "$p" ]; then continue; fi
           echo "Trying candidate password..."
           if mongosh "mongodb://${OLD_USER}:${p}@${MONGO_HOST}:${MONGO_PORT}/admin?authSource=admin" --eval 'db.runCommand({ ping:1 })' >/dev/null2>&1; then
             echo "Authenticated with a candidate password. Updating..."
             mongosh "mongodb://${OLD_USER}:${p}@${MONGO_HOST}:${MONGO_PORT}/admin?authSource=admin" --eval '
             const newPass = process.env.NEW_PASS;
             db.changeUserPassword("admin", newPass);
             print("Admin password updated");
             '
             exit 0
           fi
         done
         echo "All candidate passwords failed" >&2
         exit 1
       env:
       - name: MONGO_HOST
         value: "mongodb-service"
       - name: MONGO_PORT
         value: "27017"
       - name: OLD_USER
         valueFrom:
           secretKeyRef:
             name: mongodb-secret
             key: mongodb-username
       - name: OLD_PASS
         valueFrom:
           secretKeyRef:
             name: mongodb-secret
             key: mongodb-root-password
       - name: OLD_PASS_ALT1
         value: "xxx711717"
       - name: OLD_PASS_ALT2
         value: "xxx711717XX"
       - name: NEW_PASS
         value: "xxx711717XXX"
