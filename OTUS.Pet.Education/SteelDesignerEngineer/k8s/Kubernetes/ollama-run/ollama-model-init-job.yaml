apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-models
  namespace: ollama
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: pull
          image: curlimages/curl:8.5.0
          imagePullPolicy: IfNotPresent
          env:
            # Comma-separated list of models to pre-pull
            - name: OLLAMA_MODELS
              value: "nomic-embed-text,llama2"
          command: ["sh", "-lc"]
          args:
            - |
              set -e
              echo "Waiting for Ollama..."
              for i in $(seq 1 180); do
                if curl -fsS http://ollama.ollama.svc.cluster.local:11434/api/tags >/dev/null; then
                  break
                fi
                sleep 2
              done

              echo "Ollama is up. Pulling models: ${OLLAMA_MODELS}"
              IFS=','
              for model in ${OLLAMA_MODELS}; do
                m=$(echo "$model" | xargs)
                if [ -z "$m" ]; then
                  continue
                fi
                echo "Pulling $m..."
                curl -fsS http://ollama.ollama.svc.cluster.local:11434/api/pull \
                  -H 'Content-Type: application/json' \
                  -d "{\"name\":\"$m\"}" || {
                    echo "Pull failed for $m" >&2
                    exit 1
                  }
              done

              echo "Done."
