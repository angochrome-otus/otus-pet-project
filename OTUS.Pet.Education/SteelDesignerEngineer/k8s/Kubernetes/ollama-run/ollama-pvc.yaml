apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: ollama
spec:
  accessModes:
    - ReadWriteOnce
  # If your cluster has a specific StorageClass (recommended), set it here.
  # storageClassName: <your-storage-class>
  resources:
    requests:
      storage: 100Gi
