apiVersion: v1
kind: Secret
metadata:
  name: landscape-server-env
  namespace: database
  labels:
    app: landscape-server
type: Opaque
stringData:
  LANDSCAPE_SERVER_PORT: "8080"
  # Use internal ClusterIP host for Postgres for efficiency
  POSTGRES_HOST: postgres-global.database.svc.cluster.local
  POSTGRES_PORT: "5432"
  POSTGRES_DB: landscape
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: xxx711717
  DATABASE_URL: postgresql://postgres:xxx711717@postgres-global.database.svc.cluster.local:5432/landscape
  # Redis (namespace n8n)
  REDIS_HOST: redis.n8n.svc.cluster.local
  REDIS_PORT: "6379"
  # Unified Redis URL (with password). Change password value if different.
  REDIS_URL: redis://:xxx711717@redis.n8n.svc.cluster.local:6379/0