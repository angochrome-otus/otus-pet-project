apiVersion: v1
kind: ConfigMap
metadata:
  name: mongo-express-config
  namespace: mongodb
data:
  config.js: |
    // Custom mongo-express config that reads credentials from environment
    module.exports = {
      mongodb: {
        server: process.env.ME_CONFIG_MONGODB_SERVER || 'mongodb-service',
        port: parseInt(process.env.ME_CONFIG_MONGODB_PORT || '27017',10),
        autoReconnect: true,
        poolSize:4,
        // enable admin to view server stats
        admin: true,
        auth: {
          user: process.env.ME_CONFIG_MONGODB_ADMINUSERNAME,
          password: process.env.ME_CONFIG_MONGODB_ADMINPASSWORD,
          authSource: process.env.ME_CONFIG_MONGODB_AUTHDB || 'admin'
        },
        // do not show internal system collections that can require special privileges
        excludeCollections: [
          'system.keys',
          'system.users',
          'system.version',
          'system.profile'
        ]
      },
      site: {
        baseUrl: '/',
        cookieKeyName: 'mongo-express',
        sessionSecret: process.env.SESSION_SECRET || 'secret'
      },
      // allow writes via UI
      readOnly: false,
      useBasicAuth: true,
      basicAuth: {
        username: process.env.ME_CONFIG_BASICAUTH_USERNAME || 'admin',
        password: process.env.ME_CONFIG_BASICAUTH_PASSWORD || 'password'
      },
      options: {
        documentsPerPage:10
      }
    }
