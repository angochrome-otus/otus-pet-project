apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rebitmq

resources:
  - rebitmq-kustomize-pvc.yaml
  - rebitmq-kustomize-deployment.yaml
  - rebitmq-kustomize-service-public.yaml

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: rebitmq-kustomize-secret
    envs:
      - ../ENV/rebitmq.env
