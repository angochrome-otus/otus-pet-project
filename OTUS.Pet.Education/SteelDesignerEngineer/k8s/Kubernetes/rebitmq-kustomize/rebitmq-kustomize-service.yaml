apiVersion: v1
kind: Service
metadata:
  name: rebitmq-kustomize
  namespace: rebitmq
  labels:
    app: rebitmq-kustomize
spec:
  type: ClusterIP
  selector:
    app: rebitmq-kustomize
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
