apiVersion: v1
kind: Secret
metadata:
 name: redis-basic-auth
 namespace: n8n
type: Opaque
stringData:
 # Replace the hash with a bcrypt from: htpasswd -nbB admin 'YOUR_PASSWORD'
 # Format is: username:hash
 users: |
  admin:$2y$10$REPLACE_THIS_WITH_BCRYPT_HASH
---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
 name: redis-basic-auth
 namespace: n8n
spec:
 basicAuth:
 secret: redis-basic-auth
 removeHeader: true
