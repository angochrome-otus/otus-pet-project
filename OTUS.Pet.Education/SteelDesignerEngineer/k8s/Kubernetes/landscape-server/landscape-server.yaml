---
# Removed PersistentVolume to switch to dynamic provisioning
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: landscape-server-pvc
  namespace: database
  labels:
    app: landscape-server
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landscape-server
  namespace: database
  labels:
    app: landscape-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: landscape-server
  template:
    metadata:
      labels:
        app: landscape-server
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: landscape-server
          image: ghcr.io/canonical/landscape-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: landscape-server-env
          volumeMounts:
            - name: landscape-data
              mountPath: /var/lib/landscape
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5      # quicker checks during startup
            failureThreshold: 24  # ~2 minutes before failing
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 25
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
      volumes:
        - name: landscape-data
          persistentVolumeClaim:
            claimName: landscape-server-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: landscape-server
  namespace: database
  labels:
    app: landscape-server
spec:
  type: ClusterIP
  selector:
    app: landscape-server
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
